trigger:
  - platform: sun
    event: dawn
    offset: !input dawn_offset
    id: dawn
  - platform: sun
    event: sunrise
    offset: !input sunrise_offset
    id: sunrise
  - platform: sun
    event: solar_noon
    offset: !input solar_noon_offset
    id: solar_noon
  - platform: sun
    event: sunset
    offset: !input sunset_offset
    id: sunset
  - platform: sun
    event: dusk
    offset: !input dusk_offset
    id: dusk
  - platform: time
    at: !input slot_1_time
    id: slot_1
  - platform: time
    at: !input slot_2_time
    id: slot_2
  - platform: time
    at: !input slot_3_time
    id: slot_3
  - platform: time
    at: !input slot_4_time
    id: slot_4
  - platform: time
    at: !input slot_5_time
    id: slot_5
  - platform: time
    at: !input slot_6_time
    id: slot_6

action:
  - choose:
      - conditions:
          - condition: trigger
            id: dawn
          - condition: time
            weekday: !input dawn_weekdays
        sequence: !input dawn_actions
      - conditions:
          - condition: trigger
            id: sunrise
          - condition: time
            weekday: !input sunrise_weekdays
        sequence: !input sunrise_actions
      - conditions:
          - condition: trigger
            id: solar_noon
          - condition: time
            weekday: !input solar_noon_weekdays
        sequence: !input solar_noon_actions
      - conditions:
          - condition: trigger
            id: sunset
          - condition: time
            weekday: !input sunset_weekdays
        sequence: !input sunset_actions
      - conditions:
          - condition: trigger
            id: dusk
          - condition: time
            weekday: !input dusk_weekdays
        sequence: !input dusk_actions
      - conditions:
          - condition: trigger
            id: slot_1
          - condition: time
            weekday: !input slot_1_weekdays
        sequence: !input slot_1_actions
      - conditions:
          - condition: trigger
            id: slot_2
          - condition: time
            weekday: !input slot_2_weekdays
        sequence: !input slot_2_actions
      - conditions:
          - condition: trigger
            id: slot_3
          - condition: time
            weekday: !input slot_3_weekdays
        sequence: !input slot_3_actions
      - conditions:
          - condition: trigger
            id: slot_4
          - condition: time
            weekday: !input slot_4_weekdays
        sequence: !input slot_4_actions
      - conditions:
          - condition: trigger
            id: slot_5
          - condition: time
            weekday: !input slot_5_weekdays
        sequence: !input slot_5_actions
      - conditions:
          - condition: trigger
            id: slot_6
          - condition: time
            weekday: !input slot_6_weekdays
        sequence: !input slot_6_actions
    default: []

mode: parallel
