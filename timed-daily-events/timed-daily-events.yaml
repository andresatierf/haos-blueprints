blueprint:
  name: Timed Daily Events
  description: >-
    Trigger actions at sun events (dawn, sunrise, solar noon, sunset, dusk) and
    up to 6 configurable fixed times throughout the day.
    All slots and their actions are optional. Requires the 'sun' integration for sun slots.
  domain: automation
  source_url: https://github.com/censay/haos-blueprints
  homeassistant:
    min_version: 2025.12.1
  input:
    sun_events_header:
      name: "☀️ Sun Events"
      description: Actions triggered by sun position. Requires the 'sun' integration.
      input: {}

    dawn:
      name: Dawn
      description: Triggered at dawn. Requires the 'sun' integration. Leave offset blank to disable.
      collapsed: true
      input:
        dawn_offset:
          name: Offset
          description: Offset from dawn (e.g. 00:15:00 or -00:15:00). Leave blank to disable.
          default:
          selector:
            text:
        dawn_weekdays:
          name: Active Days
          description: Days of the week on which the dawn actions run.
          default: [mon, tue, wed, thu, fri, sat, sun]
          selector:
            select:
              multiple: true
              options:
                - { label: Monday, value: mon }
                - { label: Tuesday, value: tue }
                - { label: Wednesday, value: wed }
                - { label: Thursday, value: thu }
                - { label: Friday, value: fri }
                - { label: Saturday, value: sat }
                - { label: Sunday, value: sun }
        dawn_actions:
          name: Actions
          description: Actions to perform at dawn.
          default: []
          selector:
            action: {}

    sunrise:
      name: Sunrise
      description: Triggered at sunrise. Requires the 'sun' integration. Leave offset blank to disable.
      collapsed: true
      input:
        sunrise_offset:
          name: Offset
          description: Offset from sunrise. Leave blank to disable.
          default:
          selector:
            text:
        sunrise_weekdays:
          name: Active Days
          description: Days of the week on which the sunrise actions run.
          default: [mon, tue, wed, thu, fri, sat, sun]
          selector:
            select:
              multiple: true
              options:
                - { label: Monday, value: mon }
                - { label: Tuesday, value: tue }
                - { label: Wednesday, value: wed }
                - { label: Thursday, value: thu }
                - { label: Friday, value: fri }
                - { label: Saturday, value: sat }
                - { label: Sunday, value: sun }
        sunrise_actions:
          name: Actions
          description: Actions to perform at sunrise.
          default: []
          selector:
            action: {}

    solar_noon:
      name: Solar Noon
      description: Triggered at solar noon (true sun-highest point). Requires the 'sun' integration. Leave offset blank to disable.
      collapsed: true
      input:
        solar_noon_offset:
          name: Offset
          description: Offset from solar noon. Leave blank to disable.
          default:
          selector:
            text:
        solar_noon_weekdays:
          name: Active Days
          description: Days of the week on which the solar noon actions run.
          default: [mon, tue, wed, thu, fri, sat, sun]
          selector:
            select:
              multiple: true
              options:
                - { label: Monday, value: mon }
                - { label: Tuesday, value: tue }
                - { label: Wednesday, value: wed }
                - { label: Thursday, value: thu }
                - { label: Friday, value: fri }
                - { label: Saturday, value: sat }
                - { label: Sunday, value: sun }
        solar_noon_actions:
          name: Actions
          description: Actions to perform at solar noon.
          default: []
          selector:
            action: {}

    sunset:
      name: Sunset
      description: Triggered at sunset. Requires the 'sun' integration. Leave offset blank to disable.
      collapsed: true
      input:
        sunset_offset:
          name: Offset
          description: Offset from sunset. Leave blank to disable.
          default:
          selector:
            text:
        sunset_weekdays:
          name: Active Days
          description: Days of the week on which the sunset actions run.
