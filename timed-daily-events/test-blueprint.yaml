blueprint:
  name: "Test: Sun Events"
  description: Minimal blueprint to test all sun event triggers.
  domain: automation
  source_url: https://github.com/censay/haos-blueprints
  homeassistant:
    min_version: 2025.12.1
  input:
    dawn_actions:
      name: Dawn Actions
      default: []
      selector:
        action: {}
    sunrise_actions:
      name: Sunrise Actions
      default: []
      selector:
        action: {}
    solar_noon_actions:
      name: Solar Noon Actions
      default: []
      selector:
        action: {}
    sunset_actions:
      name: Sunset Actions
      default: []
      selector:
        action: {}
    dusk_actions:
      name: Dusk Actions
      default: []
      selector:
        action: {}

trigger:
  - platform: sun
    event: dawn
    offset: "00:00:00"
    id: dawn
  - platform: sun
    event: sunrise
    offset: "00:00:00"
    id: sunrise
  - platform: sun
    event: noon
    offset: "00:00:00"
    id: solar_noon
  - platform: sun
    event: sunset
    offset: "00:00:00"
    id: sunset
  - platform: sun
    event: dusk
    offset: "00:00:00"
    id: dusk

action:
  - choose:
      - conditions:
          - condition: trigger
            id: dawn
        sequence: !input dawn_actions
      - conditions:
          - condition: trigger
            id: sunrise
        sequence: !input sunrise_actions
      - conditions:
          - condition: trigger
            id: solar_noon
        sequence: !input solar_noon_actions
      - conditions:
          - condition: trigger
            id: sunset
        sequence: !input sunset_actions
      - conditions:
          - condition: trigger
            id: dusk
        sequence: !input dusk_actions
    default: []

mode: parallel
